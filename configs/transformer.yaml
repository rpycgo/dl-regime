# configs/transformer.yaml
# Transformer-specific overrides for dl-regime-btc.
model_name: transformer

training:
  seq_len: 60
  batch_size: 256
  max_epochs: 100
  learning_rate: 1.0e-3
  early_stopping_patience: 10
  val_split: 0.2
  random_seed: 42
  num_workers: 0

transformer:
  d_model: 64
  nhead: 4
  num_layers: 3
  dim_feedforward: 256
  dropout: 0.2
