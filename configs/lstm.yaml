# configs/lstm.yaml
# LSTM-specific overrides for dl-regime-btc.
# Merged on top of src/dl_regime/configs/default_config.toml.
model_name: lstm

training:
  seq_len: 60
  batch_size: 256
  max_epochs: 100
  learning_rate: 1e-3
  early_stopping_patience: 10
  val_split: 0.2
  random_seed: 42
  num_workers: 0

lstm:
  hidden_size: 128
  num_layers: 2
  bidirectional: false
  dropout: 0.2
