# configs/tcn.yaml
# TCN-specific overrides for dl-regime-btc.
model_name: tcn

training:
  seq_len: 60
  batch_size: 256
  max_epochs: 100
  learning_rate: 1.0e-3
  early_stopping_patience: 10
  val_split: 0.2
  random_seed: 42
  num_workers: 0

tcn:
  num_channels: [64, 64, 128, 128]
  kernel_size: 3
  dilation_base: 2
  dropout: 0.2
